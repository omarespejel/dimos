- pr: 2236
  comment_id: 3293654340
  author: greptile-apps
  file: dimos/robot/unitree/go2/connection.py
  line: 276
  problem: |
    P1 — Dict merge order silently drops `frame_id` remap.
    `remap` is built as `{Go2Config.body_frame: self.frame_id, **self.config.frame_mapping}`.
    Since `frame_mapping` defaults to an identity dict that includes `"base_link"`, the `**`
    unpack overwrites the `Go2Config.body_frame → self.frame_id` entry with
    `"base_link" → "base_link"`. Any time `frame_id` is customised (e.g. via `frame_id_prefix`,
    producing `"robot/base_link"`), the static transforms keep `"base_link"` as their parent,
    while `_publish_tf` publishes under the new name — leaving the TF tree with a dangling
    `odom → robot/base_link` edge and no `robot/base_link → camera_link` link. Suggested
    swap: `remap = {**self.config.frame_mapping, Go2Config.body_frame: self.frame_id}`.
  solution: |
    Applied greptile's suggested swap. The frame_mapping is now unpacked first and the
    `body_frame → self.frame_id` entry is written last, so a custom frame_id (e.g. when
    frame_id_prefix is set) always wins over the identity-mapping default. Static transforms
    now publish under the same root name as `_publish_tf`, keeping the TF tree connected.

