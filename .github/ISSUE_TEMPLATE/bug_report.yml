name: Bug Report
description: Report a bug in DimOS
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe what happened and include any details that seem relevant.
      value: |
        ## What happened?

        ## What did you expect?

        ## System
        <!-- e.g. Ubuntu 24.04, macOS 15.4 -->

        ## Robot / Sim / Hardware
        <!-- e.g. Unitree Go2 EDU 1.1.7, or Unity sim, with firmware version -->

        ## Steps to reproduce
        <!-- the exact command you ran -->

        ## Environment
        <!-- install method (uv, Nix, Docker), DimOS branch or commit (git rev-parse --short HEAD) -->

        ## Logs / screenshots

    validations:
      required: true
