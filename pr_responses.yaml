- pr: 2236
  comment_id: 3293617084
  author: greptile-apps
  file: dimos/robot/config.py
  line: 248
  problem: |
    P2 — `path_to` traverses non-fixed joints, so keys may have unexpected root prefixes for
    other robots. `by_child` is built from ALL joints (fixed and non-fixed). `path_to`
    therefore walks upward through floating/revolute joints as well, which can produce paths
    like `"world/base_link/camera_link"` instead of `"base_link/camera_link"` for robots that
    have a `world → (floating) → base_link` structure. Does not affect Go2 (no floating joint),
    but would silently break reuse on other robots (e.g. Spot-like configs).
  solution: |
    skipped — the comment acknowledges this only affects non-Go2 robots with floating-joint
    URDFs. This PR is scoped to Go2 static-transform cleanup; correctness for other URDFs is
    out of scope. A proper fix needs to decide root semantics (base_link vs world) and update
    `by_child` filtering — that belongs in a follow-up RobotConfig PR, not here.
  commit: null
